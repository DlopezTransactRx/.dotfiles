# remap prefix from 'C-b' to 'C-j'
#unbind C-j
#set-option -g prefix C-b
#bind-key C-b send-prefix


#act like vim
setw -g mode-keys vi
# prefix l = last-window (pane nav lives on Alt-h/j/k/l)
bind-key l last-window

# Alt-Tab / Alt-Shift-Tab cycle to next / previous window, no prefix needed
bind -n M-Tab next-window
bind -n M-BTab previous-window

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# split windows
bind | split-window -h
bind - split-window -v


# set base window to 1 instead of 0
set -g base-index 1

#enabled mouse mode
set -g mouse on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

#Resurrect (Persist Sessions)
set -g @plugin 'tmux-plugins/tmux-resurrect'

#vim tmux navigator
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'dracula/tmux'

set -g @dracula-show-powerline true
set -g @dracula-fixed-location "Pembroke Pines Florida"
set -g @dracula-plugins "weather"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g status-position top

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
